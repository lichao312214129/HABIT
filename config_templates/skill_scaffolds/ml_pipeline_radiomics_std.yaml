# Standard radiomics ML pipeline — battle-tested defaults for radiomics studies.
# Use this as a starting point for most habitat / radiomics modeling work.
#
# Selection chain rationale:
#   1) variance(0.2)        : drop near-constant features (>98% same value)
#   2) correlation(0.85)    : remove redundant features (Spearman; robust to outliers)
#   3) statistical_test     : keep features that differ by class (t-test or Mann-Whitney)
#   4) lasso (cv=10)        : final L1 selection — picks a sparse stable set

input:
  - path: <FEATURE_CSV_PATH>             # e.g. ./results/features/whole_habitat_radiomics.csv
    name: rad_                           # prefix prevents column collisions when fusing
    subject_id_col: subjID
    label_col: label
    features:

  # Add more feature blocks for fusion (clinical + habitat + msi + ith). Example:
  # - path: ./results/features/msi_features.csv
  #   name: msi_
  #   subject_id_col: subjID
  #   label_col: label

output: <OUTPUT_DIR>

split_method: stratified
test_size: 0.3
random_state: 42

normalization:
  method: z_score

feature_selection_methods:

  - method: variance
    params:
      threshold: 0.2
      plot_variances: true
      before_z_score: true               # MUST be true; z-score makes all variances=1

  - method: correlation
    params:
      threshold: 0.85
      method: spearman
      visualize: false
      before_z_score: false

  - method: statistical_test
    params:
      p_threshold: 0.05
      normality_test_threshold: 0.05
      plot_importance: true
      before_z_score: false

  - method: lasso
    params:
      cv: 10
      n_alphas: 100
      random_state: 42
      visualize: true
      before_z_score: false

models:
  LogisticRegression:
    params:
      random_state: 42
      max_iter: 1000
      C: 1.0
      penalty: l2
      solver: lbfgs

  RandomForest:
    params:
      random_state: 42
      n_estimators: 200
      max_depth: null
      max_features: sqrt
      class_weight: balanced

  XGBoost:
    params:
      random_state: 42
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1

is_visualize: true
is_save_model: true
