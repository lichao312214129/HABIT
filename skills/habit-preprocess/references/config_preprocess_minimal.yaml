  resample:
    images: [<MODALITY_LIST>]            # e.g. [T1, T2, DWI, ADC]
    target_spacing: [1.0, 1.0, 1.0]      # mm

  # registration:
  #   images: [T2, ADC]
  #   fixed_image: T2
  #   moving_images: [ADC]
  #   type_of_transform: SyNRA

  # zscore_normalization:
  #   images: [T1, T2]
