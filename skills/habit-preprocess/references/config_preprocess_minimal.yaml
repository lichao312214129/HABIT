data_dir: <PATH_TO_RAW_IMAGES>          # e.g. ./data/raw_images
out_dir: <PATH_TO_OUTPUT>               # e.g. ./data/preprocessed_images

Preprocessing:
  # Uncomment and customize the steps you need:

