input:
- path: /mnt/f/work/habit_project_v1/demo_data/ml_data/clinical_feature.csv
  name: clinical_
  subject_id_col: subjID
  label_col: label
- path: /mnt/f/work/habit_project_v1/demo_data/ml_data/breast_cancer_dataset.csv
  name: radiomics_
  subject_id_col: subjID
  label_col: label
output: /mnt/f/work/habit_project_v1/demo_data/results_config_test/cases/03_ml_multi_tables/outputs
split_method: custom
train_ids_file: /mnt/f/work/habit_project_v1/demo_data/ml_data/train_ids.txt
test_ids_file: /mnt/f/work/habit_project_v1/demo_data/ml_data/test_ids.txt
normalization:
  method: z_score
resampling:
  enabled: false
  method: random_over
  position: before_model
  ratio: 1.0
  random_state: 42
feature_selection_methods:
- method: correlation
  params:
    threshold: 0.8
    method: spearman
    visualize: false
    before_z_score: false
models:
  LogisticRegression:
    params:
      random_state: 42
      max_iter: 1000
      C: 1.0
      penalty: l2
      solver: lbfgs
is_visualize: true
is_save_model: true
visualization:
  enabled: true
  plot_types:
  - roc
  - calibration
  - confusion
  - pr
