# =============================================================================
# Image preprocessing — DEMO (default): SimpleITK registration on demo bundle
# =============================================================================
# CLI:  habit preprocess --config config/preprocessing/config_preprocessing_demo.yaml
#
# Input / output: demo_data/preprocessed/processed_images (delay2, delay3, delay5).
# Demo 包通常已含预处理结果，首次跑通可跳过本步；需重跑配准时使用。
# =============================================================================

data_dir: ../../demo_data/preprocessed/processed_images
out_dir: ../../demo_data/preprocessed

auto_select_first_file: true

Preprocessing:
  registration:
    images: [delay2, delay3, delay5]
    fixed_image: delay2
    use_mask: true
    backend: simpleitk
    type_of_transform: Rigid
    metric: MI

save_options:
  save_intermediate: true
  intermediate_steps: [registration]

processes: 1
random_state: 42
