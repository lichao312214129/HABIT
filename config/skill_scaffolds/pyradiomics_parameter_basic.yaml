# Basic PyRadiomics parameter file — first-order + shape + GLCM only.
# Use as `params_file_of_non_habitat` and/or `params_file_of_habitat`.
# Keeps feature count modest (~70 features per image) and avoids
# expensive multi-scale filters.
# Reference: https://pyradiomics.readthedocs.io/en/latest/customization.html

imageType:
  Original: {}                  # only original image (no LoG/Wavelet)

featureClass:
  firstorder:                   # 18 first-order intensity stats
  shape:                        # 14 3D shape descriptors
  glcm:                         # 24 grey-level co-occurrence matrix features

setting:
  binWidth: 25                  # fixed bin width discretization
  label: 1                      # mask label value treated as ROI
  normalize: false              # set true if you skipped z-score in preprocessing
  padDistance: 5
  # resampledPixelSpacing: [1, 1, 1]   # uncomment to resample again here
  # interpolator: sitkBSpline
