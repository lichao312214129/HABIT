# DICOM sorting config — organize raw DICOM files with dcm2niix rename mode
# Equivalent default command:
#   dcm2niix -r y -f %n_%g_%x/%s_%d/%r_%o.dcm -o <OUTPUT_DIR> <INPUT_DICOM_DIR>

# data_dir can be a directory of subject folders or a YAML listing DICOM dirs.
data_dir: <PATH_TO_DICOM_OR_YAML_LIST>
out_dir: <OUTPUT_SORTED_DICOM_DIR>

auto_select_first_file: false

Preprocessing:
  sort_dicom:
    images: [dicom]                         # key(s) containing DICOM directories
    dcm2niix_path: <PATH_TO_DCM2NIIX>        # e.g. ./dcm2niix.exe

    # dcm2niix -f pattern. Users can customize with tokens such as:
    # %n patient name, %g accession number, %x study ID,
    # %s series number, %d description, %r instance number, %o media object UID.
    filename_format: "%n_%g_%x/%s_%d/%r_%o.dcm"

    # Optional: if omitted, HABIT writes under out_dir/processed_images/images/<subject>/<key>
    # output_dir: ./demo_data/sorteddcm

    # Optional dcm2niix rename/sorting controls:
    # directory_depth: 5       # -d, search depth 0..9
    # adjacent_dicoms: true    # -a y/n
    # ignore_derived: false    # -i y/n
    # write_behavior: 2        # -w 0 skip, 1 overwrite, 2 add suffix
    # progress: false          # --progress y/n
    # verbose: false           # -v n/y/0/1/2
    # extra_args: []           # e.g. ["--terse"]

processes: 1
random_state: 42
