# Demo: preprocessing when inputs are DICOM folders listed in a manifest YAML.
#
# The manifest (paths relative to that file) is at demo_data/configs/manifests/files_preprocessing.yaml.
# Typical workflow: (1) edit the manifest for your subjects, (2) optionally enable dcm2nii / resample blocks.
#
# Data paths (relative to this file: demo_data/configs/preprocess/)
data_dir: ../manifests/files_preprocessing.yaml
out_dir: ../../preprocessed_from_dicom_manifest

# Preprocessing settings
Preprocessing:
  # Uncomment to convert DICOM folders to NIfTI first (set dcm2niix_path for your OS).
  # dcm2nii:
  #   images: [delay2, delay3, delay5]
  #   dcm2niix_path: ../../dcm2niix.exe
  #   compress: true
  #   anonymize: true

  registration:
    images: [delay2, delay3, delay5]
    fixed_image: delay2
    type_of_transform: Rigid
    use_mask: true
    backend: elastix
    elastix_parameter_files: ../../Par0040affine.txt

save_options:
  save_intermediate: true

# General settings
processes: 1
random_state: 42
