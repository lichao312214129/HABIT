# ----------------------------------------------------------------------------
# One shell call:  dcm2niix -r y -f "<f>"  [extra_args...]  -o <out_dir> <data_dir>
# Key `f` is exactly dcm2niix -f (deprecated YAML alias: filename_format).
# ----------------------------------------------------------------------------
#
#   habit sort-dicom --config config/dicom_sort/config_sort_dicom.yaml
#
# Paths resolve relative to this YAML file.
# ----------------------------------------------------------------------------

data_dir: ../../demo_data/dicom
out_dir: ../../demo_data/sorteddcm

dcm2niix_path: ../../demo_data/dcm2niix.exe
f: "subj_%n_%g_%x/%s_%d/%r_%o.dcm"
# extra_args: ["-d", "5"]
extra_args: []
