# =============================================================================
# Feature extraction — 特征提取 — 全部类型
# =============================================================================
# CLI:  habit extract --config config/feature_extraction/config_extract_features_demo.yaml
#       python tests/feature_extraction/extract_features.py
# Must-edit keys: #%%================================================================================ pairs (config/README_CONFIG.md)
