# =============================================================================
# Habitat feature extraction — DEMO (`demo_data` paths)
# =============================================================================
# CLI:  habit extract --config config/feature_extraction/config_extract_features_demo.yaml
#
# Purpose:
#   Matches repository walkthrough: reads processed images + a habitat map root
#   under ../../demo_data and writes features alongside other demo results.
#
# Default `habitats_map_folder` points at **direct_pooling** demo outputs; change
# it if you ran two-step (`habitat_two_step`) instead.
#
# NOT overlapping with:
#   config_extract_features.yaml — production template (your folders).
# =============================================================================

# Parameter files (relative to this file: config/feature_extraction/)
params_file_of_non_habitat: ../radiomics/parameter.yaml  # Parameter file for extracting radiomics features from original images
params_file_of_habitat: ../radiomics/parameter_habitat.yaml  # Parameter file for extracting radiomics features from habitat maps

# Data directories (under demo_data/ when resolved from this file)
raw_img_folder: ../../demo_data/preprocessed/processed_images  # Root directory containing original images
habitats_map_folder: ../../demo_data/results/habitat_direct_pooling  # Root directory containing habitat maps
out_dir: ../../demo_data/results/features  # Output directory for results

# Feature extraction parameters
n_processes: 3  # Number of processes to use for parallel processing
habitat_pattern: '*_habitats.nrrd'  # Pattern for matching habitat files
# Feature type parameters
feature_types:  # Types of features to extract
  - traditional
  - non_radiomics
  - whole_habitat
  # - each_habitat
  - msi
  - ith_score


n_habitats:   # Number of habitats to process (empty for auto detection)

# Debug parameter
debug: false  # Enable debug mode 