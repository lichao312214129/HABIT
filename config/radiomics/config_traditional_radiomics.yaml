# =============================================================================
# Traditional Radiomics — DEMO: resample_02 (T1, T2)
# =============================================================================

#
# Used by:  habit radiomics
#           python tests/machine_learning/ml_radiomics_standalone.py
#
# Data: .cursor/test/resample_02 (images/ + masks/, modalities T1/T2)
# Path convention: relative paths (../, ../../) resolve from this YAML file's directory,
# not the shell cwd. Example: ../../demo_data/... => repository demo_data/.
# =============================================================================

paths:
  params_file: ./parameter.yaml
  images_folder: ../../.cursor/test/resample_02
  out_dir: ../../demo_data/results/radiomics_traditional_resample02

processing:
  n_processes: 2
  save_every_n_files: 5
  process_image_types:
    - T1
    - T2

export:
  export_by_image_type: true
  export_combined: true
  export_format: csv
  add_timestamp: false

logging:
  level: INFO
  console_output: true
  file_output: true
