# PyRadiomics parameter preset for voxel_radiomics (habitat clustering).
#
# NOTE (habit voxel_radiomics): kernelRadius, voxelBatch, useTorchRadiomics, torchGpus, etc.
# are NOT PyRadiomics YAML settings here. Set them in FeatureConstruction.voxel_level.params
# in your habitat config. Habit default voxelBatch: 1000; use -1 for no batching.
#
# GLCM: list stable features only. Bare ``glcm:`` (all 24 features) fails on small kernels
# because MCC/Imc1/Imc2 need eigenvalue or mutual-information stats on degenerate 1×1 GLCM
# matrices (flat local neighborhoods). Habit also defaults to this list when glcm is
# enabled without explicit feature names — see habit.utils.radiomics_params_utils.

# #############################  Extracted using PyRadiomics version: <version>  ######################################

imageType:
  Original: {}
  # LoG:
  #   sigma: [2.0, 3.0, 4.0, 5.0]
  # Wavelet: {}
  # Square: {}
  # SquareRoot: {}
  # Logarithm: {}
  # Exponential: {}
  # Gradient: {}
  # LBP3D: {}

featureClass:
  # shape: not supported in voxel-based mode
  firstorder:
  glcm:                             # Voxel-based: stable GLCM only (exclude MCC/Imc1/Imc2)
    - Contrast
    - Correlation
    - JointEnergy
    - Idm
    - Autocorrelation
    - JointAverage
    - JointEntropy
    - DifferenceAverage
    - DifferenceEntropy
    - SumAverage
    - SumEntropy
    - SumSquares
    - MaximumProbability
    - Idmn
    - Id
    - Idn
    - InverseVariance
    - DifferenceVariance
    - ClusterTendency
    - ClusterShade
    - ClusterProminence
  # glrlm:
  # glszm:
  # ngtdm:
  # gldm:

setting:
  # Normalization:
  # MR signal is usually relative, with large differences between scanners and vendors.
  normalize: false
  # normalizeScale: 100

  # Resampling:
#  interpolator: 'sitkBSpline'
#  resampledPixelSpacing: [2, 2, 2]

  # Mask validation:
  #minimumROIDimensions: 2
  #minimumROISize: 50

  # Image discretization:
  binWidth: 25

  # first order specific settings:
  voxelArrayShift: 300

  # Misc:
  # label: 1
