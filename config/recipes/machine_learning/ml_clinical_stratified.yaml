# Recipe: ML clinical features with stratified random split
# CLI: habit model -c config/recipes/machine_learning/ml_clinical_stratified.yaml -m train

input:
  - path: ../../demo_data/ml_data/clinical_feature.csv
    name: clinical_
    subject_id_col: subjID
    label_col: label

output: ../../demo_data/results/recipes/ml_clinical_stratified

split_method: stratified
test_size: 0.3
random_state: 42

normalization:
  method: z_score

resampling:
  enabled: false
  method: random_over
  position: before_model
  ratio: 1.0
  random_state: 42

feature_selection_methods:
  - method: variance
    params:
      threshold: 0.0

models:
  LogisticRegression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42
  SVM:
    params:
      C: 1.0
      kernel: rbf
      probability: true
      random_state: 42

save_options:
  save_models: true
  save_predictions: true
  save_plots: true

random_state: 42
verbose: true
