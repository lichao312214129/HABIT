# Recipe: ML clinical with SMOTE resampling before model fit
# CLI: habit model -c config/recipes/machine_learning/ml_clinical_smote.yaml -m train

input:
  - path: ../../demo_data/ml_data/clinical_feature.csv
    name: clinical_
    subject_id_col: subjID
    label_col: label

output: ../../demo_data/results/recipes/ml_clinical_smote

split_method: custom
train_ids_file: ../../demo_data/ml_data/train_ids.txt
test_ids_file: ../../demo_data/ml_data/test_ids.txt

normalization:
  method: z_score

resampling:
  enabled: true
  method: smote
  position: before_model
  ratio: 1.0
  random_state: 42

feature_selection_methods:
  - method: variance
    params:
      threshold: 0.0

models:
  LogisticRegression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

save_options:
  save_models: true
  save_predictions: true
  save_plots: true

random_state: 42
verbose: true
