# Recipe: ML radiomics with variance-only feature selection
# CLI: habit model -c config/recipes/machine_learning/ml_radiomics_variance_only.yaml -m train

input:
  - path: ../../demo_data/ml_data/breast_cancer_dataset.csv
    name: radiomics_
    subject_id_col: subjID
    label_col: label

output: ../../demo_data/results/recipes/ml_radiomics_variance_only

split_method: custom
train_ids_file: ../../demo_data/ml_data/train_ids.txt
test_ids_file: ../../demo_data/ml_data/test_ids.txt

normalization:
  method: z_score

resampling:
  enabled: false
  method: random_over
  position: before_model
  ratio: 1.0
  random_state: 42

feature_selection_methods:
  - method: variance
    params:
      threshold: 0.01

models:
  LogisticRegression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

save_options:
  save_models: true
  save_predictions: true
  save_plots: true

random_state: 42
verbose: true
