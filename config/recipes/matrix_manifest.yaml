# HABIT v1 coverage recipe matrix — machine-readable test manifest.
# Used by demo_data/results_config_test/scripts/run_config_matrix.py
#
# Each case maps to a recipe YAML under config/recipes/ or config/ templates.
# Run: python demo_data/results_config_test/scripts/run_config_matrix.py --include-slow

version: "1.0"
description: "HABIT v1 coverage recipe matrix for CLI E2E validation"

cases:
  # ---------------------------------------------------------------------------
  # Machine learning
  # ---------------------------------------------------------------------------
  - case_id: ml_radiomics
    recipe_id: ml.radiomics.logistic.train
    category: machine_learning
    name: ML radiomics (LogisticRegression)
    command: model
    base_config: config/machine_learning/config_machine_learning_radiomics.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_clinical
    recipe_id: ml.clinical.custom_split.train
    category: machine_learning
    name: ML clinical features (custom split)
    command: model
    base_config: config/machine_learning/config_machine_learning_clinical.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_multi_tables
    recipe_id: ml.multi_table.merge.train
    category: machine_learning
    name: ML multi-table merge
    command: model
    base_config: config/machine_learning/config_machine_learning_multi_tables_demo.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_kfold
    recipe_id: ml.kfold.variance.train
    category: machine_learning
    name: ML K-fold cross-validation
    command: cv
    base_config: config/machine_learning/config_machine_learning_kfold_demo.yaml
    output_keys: [output]

  - case_id: ml_clinical_stratified
    recipe_id: ml.clinical.stratified.train
    category: machine_learning
    name: ML clinical stratified split
    command: model
    base_config: config/recipes/machine_learning/ml_clinical_stratified.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_radiomics_variance_only
    recipe_id: ml.radiomics.variance_only.train
    category: machine_learning
    name: ML radiomics variance feature selection
    command: model
    base_config: config/recipes/machine_learning/ml_radiomics_variance_only.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_clinical_smote
    recipe_id: ml.clinical.smote.train
    category: machine_learning
    name: ML clinical with SMOTE resampling
    command: model
    base_config: config/recipes/machine_learning/ml_clinical_smote.yaml
    output_keys: [output]
    extra_args: ["-m", "train"]

  - case_id: ml_predict
    recipe_id: ml.clinical.predict
    category: machine_learning
    name: ML clinical predict (saved pipeline)
    command: model
    base_config: config/machine_learning/config_machine_learning_predict.yaml
    output_keys: [output, pipeline_path]
    extra_args: ["-m", "predict"]
    depends_on: [ml_clinical]
    patch: ml_predict_pipeline

