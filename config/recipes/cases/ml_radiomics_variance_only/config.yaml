input:
- path: /mnt/f/work/habit_project_v1/demo_data/ml_data/radiomics_features.csv
  name: radiomics_
  subject_id_col: subjID
  label_col: label
output: /mnt/f/work/habit_project_v1/demo_data/results_config_test/cases/ml_radiomics_variance_only/outputs
split_method: custom
train_ids_file: /mnt/f/work/habit_project_v1/demo_data/ml_data/train_ids.txt
test_ids_file: /mnt/f/work/habit_project_v1/demo_data/ml_data/test_ids.txt
normalization:
  method: z_score
resampling:
  enabled: false
  method: random_over
  position: before_model
  ratio: 1.0
  random_state: 42
feature_selection_methods:
- method: variance
  params:
    threshold: 0.01
models:
  LogisticRegression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42
save_options:
  save_models: true
  save_predictions: true
  save_plots: true
random_state: 42
verbose: true
