# Recipe: one_step + kmeans + silhouette per-subject cluster selection
# CLI: habit get-habitat -c config/recipes/habitat/habitat_one_step_silhouette_train.yaml

run_mode: train

#%%================================================================================
data_dir: ../../demo_data/preprocessed/processed_images
out_dir: ../../demo_data/results/recipes/habitat_one_step_silhouette
#%%================================================================================

FeatureConstruction:
  voxel_level:
    method: concat(raw(delay2), raw(delay3), raw(delay5))
    params: {}

  preprocessing_for_subject_level:
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    methods:
      - method: binning
        n_bins: 10
        bin_strategy: uniform
        global_normalize: false

HabitatSegmentation:
  clustering_mode: one_step

  supervoxel:
    algorithm: kmeans
    n_clusters: 50
    max_iter: 300
    n_init: 10
    one_step_settings:
      min_clusters: 2
      max_clusters: 8
      fixed_n_clusters:
      selection_method: silhouette
      plot_validation_curves: true

  habitat:
    algorithm: kmeans
    max_clusters: 10
    min_clusters: 2
    habitat_cluster_selection_method:
      - silhouette
    fixed_n_clusters:
    max_iter: 300
    n_init: 10

processes: 2
cap_processes_to_gpu_pool: false
individual_subject_timeout_sec: 900
resume: true
plot_curves: true
save_results_csv: true
random_state: 42
debug: false
