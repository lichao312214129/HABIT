# =============================================================================
# Machine Learning - DEMO: clinical features with SMOTE resampling
# =============================================================================

# CLI:  habit model --config config/machine_learning/config_machine_learning_clinical_smote.yaml -m train
#
# Input:  demo_data/ml_data/clinical_feature.csv
# Output: demo_data/results/ml_clinical_smote
# Path convention: relative paths (../, ../../) resolve from this YAML file's directory,
# not the shell cwd. Example: ../../demo_data/... => repository demo_data/.
# =============================================================================

input:
  - path: ../../demo_data/ml_data/clinical_feature.csv
    name: clinical_
    subject_id_col: subjID
    label_col: label

output: ../../demo_data/results/ml_clinical_smote

split_method: custom
train_ids_file: ../../demo_data/ml_data/train_ids.txt
test_ids_file: ../../demo_data/ml_data/test_ids.txt

normalization:
  method: z_score

resampling:
  enabled: true
  method: smote
  position: before_model
  ratio: 1.0
  random_state: 42

feature_selection_methods:
  - method: variance
    params:
      threshold: 0.0

models:
  LogisticRegression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

save_options:
  save_models: true
  save_predictions: true
  save_plots: true

random_state: 42
verbose: true
