# Habitat Analysis Configuration (Two-Step Strategy) - Predict Mode
# This configuration is used for prediction using a pre-trained two-step habitat pipeline.
# Usage: habit get-habitat --config config/habitat/config_habitat_two_step_predict.yaml
# Note: All configuration is in YAML file, no command-line mode override needed.

# Run mode and pipeline settings (REQUIRED for predict mode)
run_mode: predict  # train (train a new model) or predict (use a pre-trained model)
pipeline_path: ../../demo_data/results/habitat_two_step/habitat_pipeline.pkl  # Path to trained pipeline for predict mode

# Data paths (relative to this file: config/habitat/)
data_dir: file_habitat.yaml  # Path to data configuration file (same format as training)
out_dir: ../../demo_data/results/habitat_two_step/predict  # Output directory for prediction results

# Habitat segmentation settings (minimal required for predict mode)
HabitatSegmentation:
  clustering_mode: two_step

# General settings
processes: 2  # Number of parallel processes
individual_subject_timeout_sec: 900  # 15 min cap per subject; null disables
oom_backoff: false
# Checkpoint / resume (train only; ignored in predict mode)
resume: true
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2  # Train only; ignored in predict mode
clear_checkpoint_on_success: false
plot_curves: true  # Whether to generate and save plots
save_results_csv: true  # Whether to save results as CSV files
random_state: 42  # Must match training top-level seed (predict uses serialized pipeline; seed mainly for numpy/plots)
debug: false  # Enable debug mode for detailed logging
