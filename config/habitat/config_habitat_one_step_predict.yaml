# Habitat Analysis Configuration (One-Step Strategy) - Predict Mode
# This configuration is used for prediction using a pre-trained one-step habitat analysis pipeline
# Usage: habit get-habitat --config config/habitat/config_habitat_one_step_predict.yaml
# Note: All configuration is in YAML file, no command-line mode override needed

# Run mode and pipeline settings (REQUIRED for predict mode)
run_mode: predict  # train (if you want to train a new model, set to train) or predict (if you want to use a pre-trained model, set to predict)
pipeline_path: ../../demo_data/results/habitat_one_step/habitat_pipeline.pkl  # Path to trained pipeline for predict mode (REQUIRED for predict mode)

# Data paths (relative to this file: config/habitat/)
data_dir: file_habitat.yaml  # Path to data configuration file (same format as training)
out_dir: ../../demo_data/results/habitat_one_step/predict  # Output directory for prediction results

# Habitat segmentation settings (minimal required for predict mode)
HabitatSegmentation:
  clustering_mode: one_step


# General settings
processes: 2  # Number of parallel processes
individual_subject_timeout_sec: 900  # 15 min cap per subject; null disables
plot_curves: true  # Whether to generate and save plots
save_results_csv: true  # Whether to save results as CSV files
random_state: 42  # Random seed for reproducibility (should match training)
debug: false  # Enable debug mode for detailed logging
