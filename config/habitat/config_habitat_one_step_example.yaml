# Habitat Analysis Configuration - One-Step Mode Example
# Legacy YAML syntax illustration (not the primary template).
# Must-edit keys: wrapped in #%%==== block pairs (config/README_CONFIG.md)

#%%================================================================================
data_dir: CHANGE_ME
out_dir: CHANGE_ME
#%%================================================================================

FeatureConstruction:
  voxel_level:
    steps:
      - method: raw_feature
        image: T1
        params: {}
      - method: raw_feature
        image: T2
        params: {}
    method: concat_image
    params: {}

HabitatSegmentation:
  clustering_mode: one_step
  supervoxel:
    algorithm: kmeans
  one_step_settings:
    fixed_n_clusters: null
    min_clusters: 2
    max_clusters: 10
    selection_method: silhouette
    plot_validation_curves: true
  habitat:
    mode: training
  postprocess_habitat:
    enabled: false
    min_component_size: 30
    connectivity: 1
    debug_postprocess: false
    reassign_method: neighbor_vote
    max_iterations: 3

processes: 4
cap_processes_to_gpu_pool: true
individual_subject_timeout_sec: 900
oom_backoff: false
resume: true
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false
random_state: 42
plot_curves: true
