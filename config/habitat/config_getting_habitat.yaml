# ----------------------------------------------------------------------------
# Habitat Analysis Configuration Template
# ----------------------------------------------------------------------------
#
# This template is based on actual code implementation
# All parameters listed here are supported by the code
#
# Quick Start:
#   CLI:    habit get-habitat --config config/habitat/config_getting_habitat.yaml
#
# Role:
#   Primary *annotated* habitat template: edit data_dir/out_dir and
#   FeatureConstruction / HabitatSegmentation for your study (any clustering_mode).
#
# NOT overlapping with:
#   config_habitat_two_step.yaml — ready-to-run DEMO train on ../../demo_data (two_step).
#   config_habitat_*_predict.yaml — predict-only stubs.
#   config_habitat_one_step_example.yaml — legacy YAML syntax illustration.
#   file_habitat.yaml — manifest of subjects/phases for CLI when using list input.
# ----------------------------------------------------------------------------
# Data Paths (Required)
# ----------------------------------------------------------------------------
# Root directory containing subject data
# Expected structure: data_dir/subject_id/images/ and data_dir/subject_id/masks/
data_dir: H:\Registration_ICC_structured

# Output directory for results
# Will be created if it doesn't exist
out_dir: H:\results_icc_testing


# ----------------------------------------------------------------------------
# Feature Construction Configuration
# ----------------------------------------------------------------------------
FeatureConstruction:
  # Voxel-level feature extraction
  voxel_level:
    # Feature extraction method expression
    # 
    # Supported methods (can be nested):
    #   - raw(image_name): Raw intensity values from single image
    #   - kinetic(raw(img1), raw(img2), ..., timestamps): Kinetic features from multi-phase images
    #   - voxel_radiomics(image_name): PyRadiomics features at voxel level
    #   - concat(raw(img1), raw(img2), ...): Concatenate multiple image intensities
    #   - local_entropy(image_name): Local entropy features
    #   - mean_voxel_features(): Mean of voxel features (used in supervoxel aggregation)
    #   - custom: User-defined feature extractors (see features/README.md)
    # 
    # Examples:
    #   Single image:    raw(T1)
    #   Multiple images: concat(raw(T1), raw(T2), raw(DWI))
    #   Kinetic (DCE):   kinetic(raw(pre_contrast), raw(LAP), raw(PVP), raw(delay_3min), timestamps)
    #   Radiomics:       voxel_radiomics(T2)
    method: kinetic(raw(pre_contrast), raw(LAP), raw(PVP), raw(delay_3min), timestamps)

    # Parameters for feature extraction
    params:
      # Path to Excel file with timestamps (required for kinetic method)
      # File should contain patient IDs and scan times for each phase
      timestamps: F:\work\research\radiomics_TLSs\data\scan_time_of_phases.xlsx

      # PyRadiomics parameter file (required for voxel_radiomics method)
      # params_file: ../../config/radiomics/params_voxel_radiomics.yaml
      #
      # IMPORTANT — voxel GLCM: use params_voxel_radiomics.yaml (or list GLCM features explicitly).
      # Bare ``glcm:`` enables all 24 GLCM features. At kernelRadius=1–3 each voxel sees only
      # a 3×3×3–7×7×7 neighborhood; many patches are flat, GLCM degenerates to 1×1, and
      # MCC/Imc1/Imc2 crash (CUDA/MKL eigvals) or return NaN. The preset lists 21 stable
      # features; if you omit the list, HABIT defaults to the same set and logs a warning.
      #
      # Example params_file (see config/radiomics/params_voxel_radiomics.yaml):
      #   featureClass:
      #     firstorder:
      #     glcm:
      #       - Contrast
      #       - Correlation
      #       ... (21 stable features; exclude MCC, Imc1, Imc2)
      #
      # Kernel radius for voxel-based extraction (default: 1)
      # kernelRadius: 1     # 1 = 3x3x3 neighborhood, 2 = 5x5x5, etc.
      # voxelBatch: 1000    # habit default; -1 = no batching; lower for GPU / large ROI
      # Params below are forwarded even when omitted from the method expression string.
      # TorchRadiomics acceleration (optional; requires torch + CUDA for auto)
      # useTorchRadiomics: auto   # auto | true | false
      # torchGpus: [0, 1, 2]      # which GPU indices are allowed
      # torchGpuCount: 2          # use at most N GPUs from torchGpus
      # torchDevice: auto         # single-GPU fallback when torchGpus is omitted
      # torchDtype: float32   # default; use float64 for strict CPU PyRadiomics parity
      # Window size for local_entropy method
      # window_size: [3, 3, 3]

  # Supervoxel-level feature aggregation
  supervoxel_level:
    # Pattern to match supervoxel files in subject directories
    # Uses glob pattern matching
    supervoxel_file_keyword: '*_supervoxel.nrrd'

    # Aggregation method for supervoxel features
    # Supported methods:
    #   - mean_voxel_features(): Mean of voxel features within each supervoxel
    #   - supervoxel_radiomics(image_name): PyRadiomics ROI texture per supervoxel label
    #
    # supervoxel_radiomics notes (habit implementation):
    #   - Discretization: PyRadiomics _applyBinning once on union mask (all labels > 0)
    #   - Matrices: native cMatrices per label (_initCalculation ROI path)
    #   - Torch backend when useTorchRadiomics resolves to torch (CUDA or CPU torch)
    #   - supervoxelBatch (default 64): batch group size; not voxel kernel radius
    #   - supervoxelUnionBboxCrop (default true): crop to union supervoxel bbox before extraction
    #   - kernelRadius in method expression is for voxel_radiomics only; ignored here
    #
    # Examples:
    #   Mean features:  mean_voxel_features()
    #   Radiomics:      supervoxel_radiomics(T2)
    method: mean_voxel_features()

    # Parameters for aggregation
    params:
      params_file: ../radiomics/params_supervoxel_radiomics.yaml
      # PyRadiomics parameter file (required if method is supervoxel_radiomics)
      # supervoxelBatch: 64
      supervoxelUnionBboxCrop: true
      # useTorchRadiomics: auto   # inherits from voxel_level.params when omitted
      # torchGpus: [0, 1]
      # torchGpuCount: 2
      # torchDtype: float32

  # Feature preprocessing at individual subject level (Optional)
  # Applied before clustering, within each subject
  # preprocessing_for_subject_level:
  #   methods:
  #     - method: winsorize  # Limit extreme values to specified percentiles
  #       winsor_limits: [0.05, 0.05]  # Lower and upper percentiles to clip
  #       global_normalize: false  # Whether to apply globally or per-feature
  #     
  #     - method: minmax  # Min-max scaling to [0, 1]
  #       global_normalize: false
  #     
  #     - method: zscore  # Z-score standardization
  #       global_normalize: false
  #     
  #     - method: robust  # Robust scaling using IQR
  #       global_normalize: false
  #     
  #     - method: log  # Log transformation (log(x + 1))
  #       global_normalize: false

  # Feature preprocessing at population level (Optional)
  # Applied to aggregated supervoxel features from all subjects
  preprocessing_for_group_level:
    methods:
    - method: binning
      n_bins: 10
      bin_strategy: uniform
      global_normalize: false
HabitatSegmentation:
  # Clustering mode
  # Options:
  #   - two_step: Individual-level (voxel->supervoxel) + Population-level (supervoxel->habitat)
  #   - one_step: Individual-level only (voxel->habitat for each tumor independently)
  clustering_mode: two_step

  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  # Supervoxel Clustering (Step 1 for two_step, or final step for one_step)
  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  supervoxel:
    # Clustering algorithm
    # Options: kmeans, gmm
    algorithm: kmeans

    # Number of clusters
    # - For two_step: fixed number of supervoxels per subject
    # - For one_step: maximum number to test (actual number determined automatically)
    n_clusters: 50

    # two_step: individual supervoxel clustering seed (omit to inherit top-level random_state)
    random_state: 42

    # Maximum iterations for clustering algorithm
    max_iter: 300

    # Number of initializations (only for kmeans)
    n_init: 10

    # Settings for one_step mode only
    one_step_settings:
      # Fixed number of clusters (optional)
      # If specified, automatic selection is skipped and this value is used for all subjects
      # Set to null for automatic selection
      fixed_n_clusters:

      # Minimum number of clusters to test (used when fixed_n_clusters is null)
      min_clusters: 2

      # Maximum number of clusters to test (used when fixed_n_clusters is null)
      max_clusters: 10

      # Method to select optimal number of clusters (used when fixed_n_clusters is null)
      # Options: silhouette, calinski_harabasz, davies_bouldin, inertia
      selection_method: silhouette

      # Whether to plot validation curves for each tumor
      plot_validation_curves: true

  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  # Habitat Clustering (Step 2, only for two_step mode)
  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  habitat:
    # Mode
    # Options:
    #   - training: Train new habitat clustering model
    #   - testing: Use pre-trained model
    # Default model path: {out_dir}/supervoxel2habitat_clustering_model.pkl
    # Default preprocessing: {out_dir}/mean_values_of_all_supervoxels_features.csv
    mode: testing

    # Clustering algorithm
    # Options: kmeans, gmm
    algorithm: kmeans

    # Minimum number of habitat clusters to test
    min_clusters: 2

    # Maximum number of habitat clusters to test
    max_clusters: 10

    # Method to select optimal number of clusters
    # For kmeans: inertia, silhouette, calinski_harabasz
    # For gmm: aic, bic, silhouette, calinski_harabasz
    habitat_cluster_selection_method: inertia

    # Fixed number of clusters (optional)
    # If specified, automatic selection is skipped
    # Set to null or omit for automatic selection
    fixed_n_clusters: 4

    # Group habitat (two_step/direct_pooling) or one_step individual clustering (preferred over supervoxel)
    random_state: 42

    # Maximum iterations for clustering algorithm
    max_iter: 300

    # Number of initializations (only for kmeans)
    n_init: 10

  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  # Optional Label-Map Post-processing (Connected Components)
  # ->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->->
  # Goal: reduce tiny fragmented patches in supervoxel/habitat maps.
  # Works on 3D label maps inside ROI only (outside ROI remains 0).
  # Current implementation uses a fast SimpleITK path:
  # 1) Remove tiny connected components per label (temporary)
  # 2) Refill removed ROI voxels by nearest large-component seed
  # This design keeps ROI fully labeled while reducing tiny islands.
  postprocess_supervoxel:
    enabled: false
    min_component_size: 30   # Components smaller than this are treated as tiny fragments
    connectivity: 1          # 1=face-neighbor only, 2/3=full-connected behavior in current SITK path
    debug_postprocess: false # true: print per-label detailed logs for troubleshooting
    reassign_method: neighbor_vote  # Deprecated/ignored in current fast path (kept for compatibility)
    max_iterations: 3               # Deprecated/ignored in current fast path (kept for compatibility)

  postprocess_habitat:
    enabled: false
    min_component_size: 30
    connectivity: 1          # 1=face-neighbor only, 2/3=full-connected behavior in current SITK path
    debug_postprocess: false # true: print per-label detailed logs for troubleshooting
    reassign_method: neighbor_vote  # Deprecated/ignored in current fast path (kept for compatibility)
    max_iterations: 3               # Deprecated/ignored in current fast path (kept for compatibility)


# ----------------------------------------------------------------------------
# General Settings — parallelism, checkpoint, outputs
# ----------------------------------------------------------------------------
# processes: Stage-1 (individual-level) parallel worker count. Each worker runs one
#   subject through all individual steps (features, preprocess, clustering, ...).
#   Peak RAM ≈ processes × per-subject memory. Default 2. Must be > 0.
processes: 2

# cap_processes_to_gpu_pool: When true (default) and useTorchRadiomics uses CUDA,
#   workers are capped to len(torchGpus) so each slot binds one GPU (stable, less OOM).
#   When false, keep full processes; workers share GPUs via gpuSlotIndex % len(torchGpus)
#   so CPU-heavy steps can use all cores on 1-GPU / many-CPU machines. Ignored on CPU-only.
cap_processes_to_gpu_pool: true

# individual_subject_timeout_sec: Wall-clock seconds per subject in Stage-1 parallel pass;
#   default 900 (15 min). null disables timeout. Any positive value forces spawn even when
#   processes=1.
individual_subject_timeout_sec: 900

# individual_subject_graceful_shutdown_sec: Seconds after terminate() before kill() when
#   a subject exceeds individual_subject_timeout_sec. Default 15.
# individual_subject_graceful_shutdown_sec: 15

# individual_subject_spawn_timeout_sec: Max seconds for spawn child startup; default 120.
#   null disables spawn startup timeout.
# individual_subject_spawn_timeout_sec: 120

# on_subject_failure: continue (default) — proceed with successful subjects when possible.
#   fail_fast — abort the run if any subject fails or times out.
# on_subject_failure: continue

# oom_backoff: When true, reduce parallel workers after MemoryError (default true in schema).
oom_backoff: false  # Demo template: do not shrink worker pool on MemoryError

# oom_reduce_workers_by: Workers to subtract per MemoryError when oom_backoff is true. Default 1.
# oom_reduce_workers_by: 1

# Checkpoint / resume (train and predict Stage-1) — default dirs:
#   train:   <out_dir>/.habitat_checkpoint/
#   predict: <out_dir>/.habitat_predict_checkpoint/
# resume: true — skip manifest completed subjects; failed subjects skipped unless retry flags set.
resume: true
# checkpoint_dir: null — use default under out_dir; set an absolute path to share across runs.
checkpoint_dir: null
# force_rerun_subjects: Subject IDs to reprocess even when resume=true and checkpoint exists.
force_rerun_subjects: []
# retry_failed_subjects: On next CLI start, re-queue all manifest failed_subjects (not in-run retry).
retry_failed_subjects: false
# individual_subject_auto_retry_rounds: Same-run Stage-1 auto-retry rounds for failed subjects. Default 2; 0=off.
individual_subject_auto_retry_rounds: 2
# individual_subject_parallel_mode: persistent (default) | isolated (spawn per subject).
individual_subject_parallel_mode: persistent
# persistent_worker_max_consecutive_failures: Restart persistent slot after N consecutive fatal failures.
persistent_worker_max_consecutive_failures: 1
# persistent_worker_recycle_after_tasks: Restart persistent worker after N successes; 0=off.
persistent_worker_recycle_after_tasks: 0
# clear_checkpoint_on_success: Delete checkpoint after a fully successful run. Default false.
clear_checkpoint_on_success: false
# Config hash must match on resume (data_dir + FeatureConstruction + HabitatSegmentation).
# Full documentation: docs/source/user_guide/habitat_segmentation_zh.rst (断点续训)

# plot_curves: Generate cluster validation curves and related plots under out_dir.
plot_curves: true

# save_results_csv: Write habitat/feature summary CSV files. Default true.
# save_results_csv: true

# save_images: Write *_habitats.nrrd maps (masks loaded from data_dir at export). Default true.
# save_images: true

# random_state: Global seed; HabitatSegmentation sub-blocks inherit when random_state omitted.
random_state: 42

# verbose: Detailed progress logs. Default true in schema.
# verbose: true

# debug: Enable debug-level logging.
debug: false


# ----------------------------------------------------------------------------
# Notes
# ----------------------------------------------------------------------------
#
# 1. All paths can be absolute or relative
# 2. YAML format: use 2 spaces for indentation (no tabs)
# 3. Null values can be expressed as: null or by omitting the value
# 4. For list of methods, use "- method:" syntax
#
# ----------------------------------------------------------------------------
