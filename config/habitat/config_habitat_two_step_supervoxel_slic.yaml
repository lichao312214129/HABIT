# =============================================================================
# Habitat �?DEMO: two-step with SLIC supervoxel + K-Means habitat (silhouette)
# =============================================================================
# CLI:  habit get-habitat --config config/habitat/config_habitat_two_step_supervoxel_slic.yaml
#       python tests/habitat/habitat_two_step_supervoxel_slic_train.py
#
# Input: ../../demo_data/preprocessed/processed_images
# Output: ../../demo_data/results/habitat_two_step_supervoxel_slic
# =============================================================================

run_mode: train

#%%================================================================================
data_dir: F:\work\habit_project\.cursor\test\resample_02
out_dir: ../../demo_data/results/habitat_two_step_supervoxel_slic
#%%================================================================================

FeatureConstruction:
  voxel_level:
    method: concat(voxel_radiomics(T1), voxel_radiomics(T2))
    params:
      params_file: ../radiomics/params_voxel_radiomics.yaml
      kernelRadius: 3
      voxelBatch: 1000
      useTorchRadiomics: auto
      torchGpus: []

  supervoxel_level:
    supervoxel_file_keyword: '*_supervoxel.nrrd'
    method: mean_voxel_features()
    params: {}

  preprocessing_for_subject_level:
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    # Stage 2 only - NOT in config_hash. Prefer for radiomics-heavy features.
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: variance_filter
        variance_threshold: 0.01
        global_normalize: false
      - method: correlation_filter
        corr_threshold: 0.9
        corr_method: spearman
        global_normalize: false
      - method: minmax
        global_normalize: false
      


HabitatSegmentation:
  clustering_mode: two_step

  supervoxel:
    algorithm: slic
    n_clusters: 50
    compactness: 0.5
    sigma: 0.5
    enforce_connectivity: true
    max_iter: 10
    n_init: 10
    one_step_settings:
      min_clusters: 2
      max_clusters: 10
      fixed_n_clusters:
      selection_method: kneedle
      plot_validation_curves: true

  habitat:
    algorithm: kmeans
    max_clusters: 10
    n_clusters: 50
    random_state: 42
    max_iter: 300
    n_init: 10

processes: 4
cap_processes_to_gpu_pool: false
individual_subject_timeout_sec: 900
oom_backoff: false

resume: true
strict_checkpoint_hash: false
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false

plot_curves: true
save_results_csv: true
random_state: 42
debug: false
