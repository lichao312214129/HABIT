# =============================================================================
# Habitat — 二步法生境 — 超体素纹理（影像组学）特征 — 训练
# =============================================================================

# CLI:  habit get-habitat --config config/habitat/config_habitat_two_step_supervoxel_radiomics_train.yaml
#       python tests/habitat/habitat_two_step_supervoxel_radiomics_train.py
#
# Purpose:
#   Two-step clustering (supervoxel then population habitat)
#   Feature: supervoxel texture — supervoxel_radiomics(delay2, params_file)
#   Demo data: demo_data/preprocessed/processed_images (T1, T2; images/ + masks/ under data_dir root)
#
# Must-edit keys: wrapped in #%%================================================================================ pairs (config/README_CONFIG.md)
# Path convention: relative paths (../, ../../) resolve from this YAML file's directory,
# not the shell cwd. Example: ../../demo_data/... => repository demo_data/.
# =============================================================================

#%%================================================================================
run_mode: train
data_dir: ../../demo_data/preprocessed/processed_images
out_dir: ../../demo_data/results/habitat_two_step_supervoxel_radiomics
#%%================================================================================

FeatureConstruction:
  voxel_level:
    method: concat(raw(delay2), raw(delay3), raw(delay5))
    params: {}

  supervoxel_level:
    supervoxel_file_keyword: '*_supervoxel.nrrd'
    method: concat(supervoxel_radiomics(delay2, params_file))
    params:
      params_file: ../radiomics/params_supervoxel_radiomics.yaml
      supervoxelUnionBboxCrop: true
      useSupervoxelCext: auto
      useTorchRadiomics: auto

  preprocessing_for_subject_level:
    # Stage 1: per-subject, before checkpoint (included in config_hash).
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    # Stage 2 only - NOT in config_hash. Prefer for radiomics-heavy features.
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: variance_filter
        variance_threshold: 0.01
        global_normalize: false
      - method: correlation_filter
        corr_threshold: 0.9
        corr_method: spearman
        global_normalize: false
      - method: minmax
        global_normalize: false


HabitatSegmentation:
  clustering_mode: two_step

  supervoxel:
    algorithm: kmeans
    n_clusters: 50
    max_iter: 300
    n_init: 10
    one_step_settings:
      min_clusters: 2
      max_clusters: 10
      fixed_n_clusters:
      selection_method: elbow
      plot_validation_curves: true


  habitat:
    algorithm: kmeans
    max_clusters: 10
    habitat_cluster_selection_method:
      - elbow
    fixed_n_clusters:
    max_iter: 300
    n_init: 10


processes: 2
cap_processes_to_gpu_pool: false
individual_subject_timeout_sec: 900
oom_backoff: false

resume: true
strict_checkpoint_hash: false
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false

plot_curves: true
save_results_csv: true
random_state: 42
debug: false

