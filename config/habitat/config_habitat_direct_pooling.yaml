# =============================================================================
# Habitat Analysis Configuration (Direct Pooling Strategy)
# =============================================================================
# CLI: habit get-habitat --config config/habitat/config_habitat_direct_pooling.yaml
#
# Flow: voxel features -> subject preprocessing -> [checkpoint]
#       -> concat all voxels -> group preprocessing -> group habitat clustering
# =============================================================================

# --- Run mode ---
run_mode: train  # train: fit pipeline | predict: apply saved pipeline (requires pipeline_path)
pipeline_path:   # Path to habitat_pipeline.pkl (required when run_mode=predict)

# --- Paths (relative to this file unless absolute) ---
data_dir: file_habitat.yaml  # Subject list YAML or data root with images/masks
out_dir: ../../demo_data/results/habitat_direct_pooling  # Output directory for all artifacts

FeatureConstruction:
  voxel_level:
    # Per-voxel feature expression (Stage 1; included in checkpoint config_hash).
    method: concat(raw(delay2), raw(delay3), raw(delay5))
    # Radiomics example:
    # method: concat(voxel_radiomics(T2, params_file, kernelRadius))
    params:
      # params_file: ../radiomics/params_voxel_radiomics.yaml  # Required for voxel_radiomics; GLCM-safe preset
      # kernelRadius: 1  # Default 1 (3x3x3); voxel neighborhood radius
      # voxelBatch: 1000  # Default 1000; -1 disables batching
      # useTorchRadiomics: auto  # auto | true | false
      # torchGpus: [0, 1]  # GPU device indices
      # torchGpuCount: 2  # Max GPUs when torchGpus not set

  supervoxel_level:
    # Not used in direct_pooling Stage 1; kept for schema compatibility.
    supervoxel_file_keyword: '*_supervoxel.nrrd'  # Pattern for optional external supervoxel maps
    method: mean_voxel_features()  # Supervoxel aggregation method (two_step/one_step)
    params:
      # Required when method is supervoxel_radiomics(); ignored by mean_voxel_features()
      params_file: ../radiomics/params_supervoxel_radiomics.yaml
      supervoxelUnionBboxCrop: true
      # supervoxel_radiomics: see config_getting_habitat.yaml for supervoxelBatch / useTorchRadiomics notes

  preprocessing_for_subject_level:
    # Stage 1: per-subject, before checkpoint (included in config_hash).
    # Do NOT use variance_filter / correlation_filter here — column drops break cross-subject pooling.
    methods:
      - method: winsorize  # Clip extreme feature values per column
        winsor_limits: [0.05, 0.05]  # Lower/upper tail fraction to clip (0-1)
        global_normalize: false  # false=within-subject stats; true=pooled training stats
      - method: minmax  # Scale features to [0, 1] after prior steps
        global_normalize: false

  preprocessing_for_group_level:
    # Stage 2 only — changing these does NOT invalidate checkpoint (resume: true OK).
    # variance_filter / correlation_filter are recommended here for radiomics-heavy features.
    methods:
      - method: binning  # Discretize continuous features (default demo)
        n_bins: 10  # Bins per feature column
        bin_strategy: uniform  # uniform | quantile | kmeans
        global_normalize: false  # Use pooled training statistics when true
      # Radiomics / high-dimensional features — uncomment instead of binning:
      # - method: variance_filter
      #   variance_threshold: 0.01
      #   global_normalize: false
      # - method: correlation_filter
      #   corr_threshold: 0.8
      #   corr_method: spearman  # pearson | spearman | kendall
      #   global_normalize: false

HabitatSegmentation:
  clustering_mode: direct_pooling  # Single pooled clustering across all subjects

  supervoxel:
    # Placeholder block (direct_pooling skips supervoxel clustering).
    algorithm: kmeans
    n_clusters: 50
    max_iter: 300
    n_init: 10
    one_step_settings:
      min_clusters: 2
      max_clusters: 10
      selection_method: inertia
      plot_validation_curves: true

  habitat:
    # Group habitat clustering (Stage 2; NOT in checkpoint hash).
    algorithm: kmeans  # kmeans | gmm
    max_clusters: 10  # Max K for automatic cluster-count search
    habitat_cluster_selection_method:
      - inertia  # Also: silhouette, calinski_harabasz, aic, bic, davies_bouldin
    fixed_n_clusters:  # int or null — fixed cluster count (null=auto)
    # random_state: null  # Omit to inherit top-level random_state
    max_iter: 300
    n_init: 10

# --- Parallelism ---
processes: 2  # Parallel workers for Stage 1
individual_subject_timeout_sec: 900  # Seconds per subject; null disables timeout
oom_backoff: false  # Reduce worker count after OOM when true

# --- Checkpoint (train only; see config_habitat_two_step.yaml for full notes) ---
resume: true  # Reuse Stage-1 pkl when config_hash matches
checkpoint_dir: null  # Default: <out_dir>/.habitat_checkpoint
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2  # In-run Stage-1 auto-retry rounds (0=off; train only)
clear_checkpoint_on_success: false

plot_curves: true  # Generate validation plots
save_results_csv: true  # Export CSV summaries
save_images: true  # Export *_habitats.nrrd label maps
random_state: 42  # Global seed; group habitat inherits when habitat.random_state omitted
debug: false  # Enable debug logging
