# =============================================================================
# Habitat Analysis Configuration (Direct Pooling Strategy)
# =============================================================================
# CLI: habit get-habitat --config config/habitat/config_habitat_direct_pooling.yaml
# =============================================================================

run_mode: train
pipeline_path:

#%%================================================================================
data_dir: file_habitat_demo.yaml
out_dir: ../../demo_data/results/habitat_direct_pooling
#%%================================================================================

FeatureConstruction:
  voxel_level:
    method: concat(raw(delay2), raw(delay3), raw(delay5))
    params: {}

  preprocessing_for_subject_level:
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    methods:
      - method: binning
        n_bins: 10
        bin_strategy: uniform
        global_normalize: false

HabitatSegmentation:
  clustering_mode: direct_pooling

  habitat:
    algorithm: kmeans
    max_clusters: 10
    habitat_cluster_selection_method:
      - elbow
    max_iter: 300
    n_init: 10

processes: 2
cap_processes_to_gpu_pool: false
individual_subject_timeout_sec: 900
oom_backoff: false

resume: true
strict_checkpoint_hash: false
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false

plot_curves: true
save_results_csv: true
save_images: true
random_state: 42
debug: false
