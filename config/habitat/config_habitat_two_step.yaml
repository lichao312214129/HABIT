# =============================================================================
# Habitat analysis — DEMO: two-step clustering (train) on bundled demo_data
# =============================================================================
# CLI:  habit get-habitat --config config/habitat/config_habitat_two_step.yaml
#
# Purpose:
#   Supervoxel then population habitat clustering on preprocessed multiphase
#   inputs (delay2/3/5) with outputs under ../../demo_data/results/habitat_two_step.
#
# NOT overlapping with:
#   config_getting_habitat.yaml — fully commented reference / starting point for
#   ANY clustering_mode (one_step, two_step, direct_pooling) on YOUR paths.
#   config_habitat_one_step*.yaml / config_habitat_direct_pooling*.yaml — other modes.
#   *_predict.yaml — predict-only stubs (run_mode: predict).
#   config_habitat_one_step_example.yaml — legacy YAML shape example (syntactic).
#   file_habitat.yaml — manifest of subjects/phases for CLI when using list input.
# ----------------------------------------------------------------------------
# Markers: #%% boxes = sections | # >>> REQUIRED / REVIEW | # (default OK)
# Legend: config/README_CONFIG.md
# ----------------------------------------------------------------------------
#%% ============================================================
#%% USER REQUIRED (edit before first run)
#%% ============================================================
# >>> REQUIRED: preprocessed root or file_habitat.yaml manifest
# Expected structure: data_dir/subject_id/images/ and data_dir/subject_id/masks/
data_dir: CHANGE_ME

# >>> REQUIRED: output directory (created if missing)
out_dir: CHANGE_ME


# ----------------------------------------------------------------------------
# Feature Construction Configuration
# ----------------------------------------------------------------------------
FeatureConstruction:
  voxel_level:
    # >>> REVIEW: feature expression (Stage 1; in config_hash)
    method: concat(raw(delay2), raw(delay3), raw(delay5))  # Stage 1; in config_hash
    # voxel_radiomics example (params forwarded even if omitted from method):
    # method: concat(voxel_radiomics(T2, params_file, kernelRadius))
    params:
      # params_file: ../radiomics/params_voxel_radiomics.yaml  # Required for voxel_radiomics; GLCM-safe preset
      # kernelRadius: 1  # Default 1 (3x3x3); local neighborhood radius for voxel radiomics
      # voxelBatch: 1000  # Default 1000; -1 = no batching
      # useTorchRadiomics: auto  # auto | true | false
      # torchGpus: [0, 1]
      # torchGpuCount: 2

  supervoxel_level:
    supervoxel_file_keyword: '*_supervoxel.nrrd'  # External supervoxel map glob (optional)
    method: mean_voxel_features()  # Supervoxel feature method after individual clustering
    params:
      # Required when method is supervoxel_radiomics(); ignored by mean_voxel_features()
      params_file: ../radiomics/params_supervoxel_radiomics.yaml
      # supervoxel_radiomics example (params forwarded even if omitted from method):
      # method: concat(supervoxel_radiomics(T2, params_file))
      # supervoxelBatch: 64  # Default 64; batch group size for union-mask binning extraction
      supervoxelUnionBboxCrop: true  # Crop to union supervoxel bbox before extraction
      # supervoxelPadDistance: 1  # Optional override; else uses padDistance from params_file (default 1)
      # useTorchRadiomics: auto  # auto | true | false; inherits from voxel_level.params when omitted
      # torchGpus: [0, 1]
      # torchGpuCount: 2
      # torchDtype: float32
      # Union-mask binning: one PyRadiomics discretization on all labels (sv_map>0), then per-label ROI cMatrices
      # kernelRadius is for voxel_radiomics only (not used by supervoxel_radiomics ROI path)

  preprocessing_for_subject_level:
    # Stage 1: per-subject, before checkpoint (included in config_hash).
    # Do NOT use variance_filter / correlation_filter here — column drops break cross-subject pooling.
    methods:
      - method: winsorize  # Stage 1; in config_hash
        winsor_limits: [0.05, 0.05]  # Lower/upper tail clip fraction
        global_normalize: false  # false=within-subject; true=pooled training stats
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    # Stage 2 only — NOT in config_hash (safe to change on resume).
    # variance_filter / correlation_filter recommended here for radiomics-heavy features.
    methods:
      - method: binning  # Default demo — discretize for stable clustering
        n_bins: 10
        bin_strategy: uniform  # uniform | quantile | kmeans
        global_normalize: false


# Habitat segmentation settings (only needed for train mode)
HabitatSegmentation:
  # Clustering strategy: "one_step", "two_step", or "direct_pooling"
  # - one_step: Individual-level only (voxel-to-habitat clustering for each tumor)
  # - two_step: Individual-level + Population-level (voxel-to-supervoxel, then supervoxel-to-habitat across patients)
  # - direct_pooling: Pool all voxels and cluster once
  clustering_mode: two_step
  
  # >>> REVIEW: individual supervoxel clustering (Stage 1; in config_hash)
  supervoxel:
    algorithm: kmeans  # kmeans | gmm | slic
    n_clusters: 50  # Supervoxels per subject (two_step) or max K (one_step)
    # random_state: null  # Omit to inherit top-level random_state
    max_iter: 300  # Max clustering iterations
    n_init: 10  # kmeans restarts
    
    # Settings for one_step mode: automatic cluster number selection for each tumor
    one_step_settings:
      min_clusters: 2           # Minimum number of clusters to test
      max_clusters: 10          # Maximum number of clusters to test
      fixed_n_clusters:        # Fixed number of clusters (if set, automatic selection is disabled)
      selection_method: inertia  # Method to determine optimal clusters: silhouette, calinski_harabasz, davies_bouldin, inertia
      plot_validation_curves: true  # Plot validation curves for each tumor
  
  # Group habitat clustering (Stage 2). NOT in config_hash — safe to change.
  habitat:
    algorithm: kmeans  # kmeans | gmm
    max_clusters: 10  # Max K for automatic habitat count selection
    # - 'silhouette', 'calinski_harabasz': Select max score (higher is better)
    # - 'inertia', 'aic', 'bic': Select elbow point using 2nd derivative (lower is better)
    habitat_cluster_selection_method: 
      - inertia  # Selection Logic: 
      # - silhouette
      # - calinski_harabasz
      # - aic
      # - bic
      # - davies_bouldin

                                               
    fixed_n_clusters:     # Fixed number of habitat clusters (set to null for automatic selection)
    # random_state: null
    max_iter: 300
    n_init: 10
#%% ========== END USER REQUIRED ==========


#%% ============================================================
#%% DEFAULT OK (change only if needed)
#%% ============================================================
processes: 5  # (default OK) Stage-1 parallel workers
cap_processes_to_gpu_pool: true  # (default OK)
individual_subject_timeout_sec: 900  # (default OK)
oom_backoff: false  # (default OK)

# ---------------------------------------------------------------------------
# Checkpoint / resume (train mode only; ignored in predict mode)
# ---------------------------------------------------------------------------
# Saves individual-level (Stage 1) progress so a interrupted run can continue.
# Default directory: <out_dir>/.habitat_checkpoint/
#   manifest.json         — completed/failed subject IDs, config_hash, stage
#   subjects/{id}.pkl     — per-subject result written by checkpoint_save step
#
# resume: false
#   false — remove existing checkpoint and process ALL subjects from scratch
#   true  — load manifest; skip completed subjects (reuse .pkl); skip failed subjects
#
# checkpoint_dir: null
#   null — use <out_dir>/.habitat_checkpoint
#   path — custom checkpoint root (keep the same path across resume runs)
#
# force_rerun_subjects: []
#   When resume=true, re-process these IDs even if already completed or failed
#
# retry_failed_subjects: false
#   When resume=true, automatically re-queue all manifest failed_subjects
#
# individual_subject_auto_retry_rounds: 2
#   After the initial Stage-1 parallel pass in one train run, re-dispatch checkpoint
#   failed subjects up to this many additional rounds (0 disables). Distinct from
#   retry_failed_subjects, which only applies on the next resume/CLI invocation.
#
# individual_subject_parallel_mode: persistent
#   persistent — long-lived worker per slot (default). isolated — spawn one child per subject.
# persistent_worker_max_consecutive_failures: 1
#   Restart a persistent worker slot after N consecutive subject failures.
# persistent_worker_recycle_after_tasks: 0
#   Restart a persistent worker after N successful tasks (0 disables periodic recycle).
#
# clear_checkpoint_on_success: false
#   false — keep checkpoint after a fully successful train (default)
#   true  — delete checkpoint directory when train finishes without error
#
# Config hash (resume=true): Stage-1 fingerprint must match manifest (see habitat_segmentation_zh.rst).
#   IN hash: data_dir, voxel_level, preprocessing_for_subject_level, supervoxel_level,
#            clustering_mode, individual-clustering blocks (supervoxel / one_step habitat).
#   NOT in hash (safe to change): preprocessing_for_group_level, group habitat.*,
#            processes, cap_processes_to_gpu_pool, individual_subject_timeout_sec,
#            individual_subject_auto_retry_rounds, individual_subject_parallel_mode,
#            persistent_worker_*, plot_curves, out_dir, ...
#   Legacy v1 manifests: group-stage-only changes migrate hash and reuse pkl cache.
#
# Failed subjects: default individual_subject_auto_retry_rounds=2 retries within the
# same train run (Stage 1 only). Cross-run resume still skips failed unless
# retry_failed_subjects=true. Manual retry: retry_failed_subjects,
# force_rerun_subjects, resume=false, or delete the checkpoint directory.
#
# two_step checkpoint boundary: after merge_supervoxel_features (supervoxel_df in .pkl)
# Group-level steps (combine / group clustering) are NOT checkpointed.
# CLI equivalent: habit get-habitat -c <yaml> --resume
# ---------------------------------------------------------------------------
resume: true  # (default OK)
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false

plot_curves: true  # (default OK)
save_results_csv: true  # (default OK)
random_state: 42  # (default OK)
debug: false  # (default OK)
#%% ========== END DEFAULT OK ========== 