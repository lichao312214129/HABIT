# =============================================================================
# Habitat analysis — DEMO: two-step clustering (train) on bundled demo_data
# =============================================================================
# CLI:  habit get-habitat --config config/habitat/config_habitat_two_step.yaml
#
# Purpose:
#   Supervoxel then population habitat clustering on preprocessed multiphase
#   inputs (delay2/3/5) with outputs under ../../demo_data/results/habitat_two_step.
#
# NOT overlapping with:
#   config_getting_habitat.yaml — fully commented reference / starting point for
#   ANY clustering_mode (one_step, two_step, direct_pooling) on YOUR paths.
#   config_habitat_one_step*.yaml / config_habitat_direct_pooling*.yaml — other modes.
#   *_predict.yaml — predict-only stubs (run_mode: predict).
#   config_habitat_one_step_example.yaml — legacy YAML shape example (syntactic).
#   file_habitat.yaml — manifest listing subjects/phases/paths for get-habitat.
# =============================================================================

# Run mode and pipeline settings (check these first!)
run_mode: train

# Data paths (relative to this file: config/habitat/)
data_dir: ../../demo_data/preprocessed1
out_dir: ../../demo_data/results/habitat_two_step

# Feature extraction settings (only needed for train mode)
FeatureConstruction:
  voxel_level:
    method: concat(raw(delay2), raw(delay3), raw(delay5))

  supervoxel_level:
    supervoxel_file_keyword: '*_supervoxel.nrrd'
    method: mean_voxel_features()
    params:
      params_file: ../radiomics/parameter.yaml

  preprocessing_for_subject_level: 
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false


  preprocessing_for_group_level:
    methods:
      - method: binning
        n_bins: 10
        bin_strategy: uniform
        global_normalize: false


# Habitat segmentation settings (only needed for train mode)
HabitatSegmentation:
  # Clustering strategy: "one_step", "two_step", or "direct_pooling"
  # - one_step: Individual-level only (voxel-to-habitat clustering for each tumor)
  # - two_step: Individual-level + Population-level (voxel-to-supervoxel, then supervoxel-to-habitat across patients)
  # - direct_pooling: Pool all voxels and cluster once
  clustering_mode: two_step
  
  # Supervoxel clustering settings (Step 1: Individual-level clustering)
  supervoxel:
    algorithm: kmeans
    n_clusters: 50  # Used in two_step mode, or as max for one_step mode
    random_state: 42
    max_iter: 300
    n_init: 10
    
    # Settings for one_step mode: automatic cluster number selection for each tumor
    one_step_settings:
      min_clusters: 2           # Minimum number of clusters to test
      max_clusters: 10          # Maximum number of clusters to test
      fixed_n_clusters:        # Fixed number of clusters (if set, automatic selection is disabled)
      selection_method: inertia  # Method to determine optimal clusters: silhouette, calinski_harabasz, davies_bouldin, inertia
      plot_validation_curves: true  # Plot validation curves for each tumor
  
  # Habitat clustering settings (Step 2: Population-level clustering, only used in two_step mode)
  habitat:
    algorithm: kmeans  # kmeans or gmm
    max_clusters: 10
    # - 'silhouette', 'calinski_harabasz': Select max score (higher is better)
    # - 'inertia', 'aic', 'bic': Select elbow point using 2nd derivative (lower is better)
    habitat_cluster_selection_method: 
      - inertia  # Selection Logic: 
      # - silhouette
      # - calinski_harabasz
      # - aic
      # - bic
      # - davies_bouldin

                                               
    fixed_n_clusters:     # Fixed number of habitat clusters (set to null for automatic selection)
    random_state: 42
    max_iter: 300
    n_init: 10

# General settings
processes: 5  # Number of parallel processes
individual_subject_timeout_sec: 900  # Per-subject wall time (seconds) in Stage 1; default 15 min; null disables timeout
oom_backoff: false  # Do not reduce parallel workers after MemoryError

# ---------------------------------------------------------------------------
# Checkpoint / resume (train mode only; ignored in predict mode)
# ---------------------------------------------------------------------------
# Saves individual-level (Stage 1) progress so a interrupted run can continue.
# Default directory: <out_dir>/.habitat_checkpoint/
#   manifest.json         — completed/failed subject IDs, config_hash, stage
#   subjects/{id}.pkl     — per-subject result written by checkpoint_save step
#
# resume: false
#   false — remove existing checkpoint and process ALL subjects from scratch
#   true  — load manifest; skip completed subjects (reuse .pkl); skip failed subjects
#
# checkpoint_dir: null
#   null — use <out_dir>/.habitat_checkpoint
#   path — custom checkpoint root (keep the same path across resume runs)
#
# force_rerun_subjects: []
#   When resume=true, re-process these IDs even if already completed or failed
#
# clear_checkpoint_on_success: false
#   false — keep checkpoint after a fully successful train (default)
#   true  — delete checkpoint directory when train finishes without error
#
# Config hash (resume=true): must match manifest.config_hash or checkpoint is cleared.
#   Included in hash: data_dir, FeatureConstruction, HabitatSegmentation
#   NOT in hash (safe to change): processes, timeout, plot_curves, verbose, out_dir, ...
#
# Failed subjects are NOT auto-retried on resume. To retry: use force_rerun_subjects,
# set resume=false, or delete the checkpoint directory.
#
# two_step checkpoint boundary: after merge_supervoxel_features (supervoxel_df in .pkl)
# Group-level steps (combine / group clustering) are NOT checkpointed.
# CLI equivalent: habit get-habitat -c <yaml> --resume
# ---------------------------------------------------------------------------
resume: true
# checkpoint_dir: null
# force_rerun_subjects: []
clear_checkpoint_on_success: false

plot_curves: true  # Whether to generate and save plots
save_results_csv: true  # Whether to save results as CSV files
random_state: 42  # Random seed for reproducibility
debug: false  # Enable debug mode for detailed logging 