# =============================================================================
# Habitat - DEMO (WSL): two-step clustering with fast Linux-native output
# =============================================================================
# CLI (WSL):  habit get-habitat --config config/habitat/config_habitat_two_step_wsl.yaml
#
# Input:  read from Windows project drive via F:/ (mapped to /mnt/f/ in WSL)
# Output: ~/habit_data/results/habitat_two_step (native WSL ext4, much faster writes)
# =============================================================================

run_mode: train

#%%================================================================================
data_dir: F:/work/habit_project_v1/demo_data/preprocessed/processed_images
out_dir: ~/habit_data/results/habitat_two_step
#%%================================================================================

FeatureConstruction:
  voxel_level:
    method: concat(raw(delay2), raw(delay3), raw(delay5))
    params: {}

  supervoxel_level:
    supervoxel_file_keyword: '*_supervoxel.nrrd'
    method: mean_voxel_features()
    params: {}

  preprocessing_for_subject_level:
    methods:
      - method: winsorize
        winsor_limits: [0.05, 0.05]
        global_normalize: false
      - method: minmax
        global_normalize: false

  preprocessing_for_group_level:
    methods:
      - method: binning
        n_bins: 10
        bin_strategy: uniform
        global_normalize: false

HabitatSegmentation:
  clustering_mode: two_step

  supervoxel:
    algorithm: kmeans
    n_clusters: 50
    max_iter: 300
    n_init: 10
    one_step_settings:
      min_clusters: 2
      max_clusters: 10
      fixed_n_clusters:
      selection_method: elbow
      plot_validation_curves: true

  habitat:
    algorithm: kmeans
    max_clusters: 10
    habitat_cluster_selection_method:
      - elbow
    fixed_n_clusters:
    max_iter: 300
    n_init: 10

processes: 2
cap_processes_to_gpu_pool: false
individual_subject_timeout_sec: 900
oom_backoff: false

resume: true
strict_checkpoint_hash: false
checkpoint_dir: null
force_rerun_subjects: []
retry_failed_subjects: false
individual_subject_auto_retry_rounds: 2
individual_subject_parallel_mode: persistent
persistent_worker_max_consecutive_failures: 1
persistent_worker_recycle_after_tasks: 0
clear_checkpoint_on_success: false

plot_curves: true
save_results_csv: true
random_state: 42
debug: false
